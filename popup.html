<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root { --ink:#1d2430; --muted:#5b6472; --line:#d8dde4; --accent:#0f5fbe; --ok:#1a7f4b; --ko:#b3261e; }
    body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; width:300px; margin:0; padding:16px; color:var(--ink); }
    h1 { font-size:14px; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    .dot.ok { background:var(--ok); } .dot.ko { background:var(--ko); } .dot.off { background:var(--muted); }
    .row { font-size:12px; color:var(--muted); margin:6px 0; word-break:break-all; }
    .row b { color:var(--ink); font-weight:600; }
    #result { font-size:12px; margin-top:10px; min-height:16px; }
    #result.ok { color:var(--ok); } #result.ko { color:var(--ko); }
    button { width:100%; margin-top:12px; padding:8px 0; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; }
    button:disabled { opacity:.5; cursor:default; }
    a { display:block; margin-top:10px; font-size:12px; color:var(--accent); text-align:center; }
  </style>
</head>
<body>
  <h1><span id="dot" class="dot off"></span><span id="statusText">Loading...</span></h1>
  <div class="row">Proxy: <b id="host">-</b></div>
  <div class="row">Domains: <b id="domains">-</b></div>
  <div id="result"></div>
  <button id="test">Test connection</button>
  <a href="#" id="openOptions">Open settings</a>
  <script src="popup.js"></script>
</body>
</html>
